    * {

        padding: 0;
        box-sizing: border-box;

    /*global css*/
    html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overflow-x: hidden; 
    }
    
    #background {
        position: fixed;

        z-index: -1;
    }

    .popup-overlay {
        display: none; 
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.9); 
        z-index: 1000; 
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px); 
    }

    .popup-content {
        width: 90%;
        max-width: 800px;
        max-height: 85vh;
        text-align: center;
    }

    /* Horizontal swipe/scroll track layout configuration */
    .gallery-track {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory; 
        gap: 20px;
        padding-bottom: 10px;
        scrollbar-width: none; 
        -ms-overflow-style: none; 
    }

    .gallery-track::-webkit-scrollbar {
        display: none; 
    }

    .gallery-track img {
        width: 100%;
        flex-shrink: 0; 
        max-height: 70vh;
        object-fit: contain;
        scroll-snap-align: center; 
    }

    .gallery-track video {
    width: 100%;
    flex-shrink: 0; 
    max-height: 70vh;
    object-fit: contain;
    scroll-snap-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    background: #000; /* Keeps a dark background placeholder behind the video box */
}

    /*--Pop up screen */

        font-family: sans-serif;
        margin-top: 15px;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }

    .close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .close-btn:hover {
        color: rgb(218, 0, 185); 
    }

    <script type="text/javascript">
     function openPopup(imageInput, captionText) {
    const overlay = document.getElementById('artOverlay');
    const track = document.getElementById('popupGalleryTrack');
    const caption = document.getElementById('popupCaption');
    const indicator = document.getElementById('swipeIndicator');
    
    track.innerHTML = '';
    caption.textContent = captionText;

    const imageList = Array.isArray(imageInput) ? imageInput : [imageInput];

    imageList.forEach(src => {
        // Check if the current file link ends in .mp4
        if (src.toLowerCase().endsWith('.mp4')) {
            // Build a responsive native video player container block
            const videoElement = document.createElement('video');
            videoElement.src = src;
            videoElement.controls = true;      // Gives users play/pause/volume controls
            videoElement.autoplay = true;      // Starts playing right when opened
            videoElement.playsInline = true;   // Prevents iOS from forcing full-screen mode
            videoElement.loop = true;          // Loops seamlessly like your showcase GIFs
            
            track.appendChild(videoElement);
        } else {
            // Standard image tracking logic fallback
            const imgElement = document.createElement('img');
            imgElement.src = src;
            imgElement.alt = "Gallery View Element";
            track.appendChild(imgElement);
        }
    });

    if (imageList.length > 1) {
        indicator.textContent = "↔ Swipe or scroll sideways to view all pages";
    } else {
        indicator.textContent = "";
    }
    
    overlay.style.display = 'flex';
    track.scrollLeft = 0;
}

function closePopup() {
    // Crucial: We need to pause any active playing videos when closing the window!
    document.getElementById('artOverlay').style.display = 'none';
    const track = document.getElementById('popupGalleryTrack');
    const videos = track.getElementsByTagName('video');
    for (let i = 0; i < videos.length; i++) {
        videos[i].pause();
    }

    document.getElementById('artOverlay').style.display = 'none';
    track.innerHTML = ''; // Safely clears out the player instance from device memory
}

window.onclick = function(event) {
    const overlay = document.getElementById('artOverlay');
    if (event.target === overlay) {
            closePopup();
        }
    }
    </script>
