<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reign art portfolio</title>
    
    <!-- OPTIMIZATION 1: Preload critical above-the-fold assets so they render instantly -->
    <link rel="preload" href="layout img/background.webp" as="image">

    <style type="text/css">
        /*-----global CSS------*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .page-wrapper {
            width: 100%;
        }

        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -5;
        }

        .ref2 {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            will-change: transform; 
            image-rendering: optimizeSpeed;
        }

        .popup-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(21, 21, 21, 0.85); 
            z-index: 1000; 
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px); 
        }

        .popup-content {
            max-width: 90%; 
            max-height: 90%;
            text-align: center;
        }

        .popup-content img {
            max-width: 100%;
            max-height: 85vh; 
            object-fit: contain;
            border: none; 
            border-radius: 4px;
        }

        .popup-content p {
            color: #fff;
            font-family: sans-serif;
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: rgb(218, 0, 185); 
        }

            #flower{

                left: -5px;

            #flower1{

            #flower2{

            .there { width: 130px !important; height: auto !important; }
            .im { width: 100px !important; height: auto !important; }
            .reign { width: 185px !important; height: auto !important; }
            .r2 { width: 100% !important; height: auto !important; display: block; }

            .fl { width: 150px !important; height: auto !important; }

            .fl2 { width: 150px !important; height: auto !important; }
            .c1 { width: 120px !important; height: auto !important; }

        #ig, #mail {

            display: block;
            }

    #ig {
        left: 125px;            
        }

    #mail {
        left: 225px;           
        }


    .insta, .contact { 
        width: 60px !important; 
        height: auto !important;

    }
        }

        /*desktop*/
        @media screen and (min-width: 768px) {
            body {
                overflow: hidden; 
                height: 100vh;
                width: 100vw;
            }

            .page-wrapper {
                position: static;    
                overflow: visible;   
                width: 100%;
                height: 100%;
            }

            #portfolio { width: 350px; height: 350px; position: absolute; left: 28%; top: 40px; z-index: 2; }
            #about { width: 350px; height: 350px; position: absolute; left: 6%; top: 350px; z-index: 2; }
            #resume { width: 350px; height: 350px; position: absolute; left: 5%; top: 40px; z-index: 2; }
            #philosophy { width: 350px; height: 350px; position: absolute; left: 28%; top: 350px; z-index: 2; }
            #ruler { width: 20px; height: 20px; position: absolute; left: -7%; transform: translateX(-50%); top: 480px; }
         
            #hey { width: 20px; height: 20px; position: absolute; left: 63%; transform: translateX(-50%); top: 70px; z-index: 3; }
            #there { width: 20px; height: 20px; position: absolute; left: 76%; transform: translateX(-50%); top: 70px; z-index: 3; }
            #im { width: 20px; height: 20px; position: absolute; left: 58%; transform: translateX(-50%); top: 150px; z-index: 3; }
            #reign { width: 20px; height: 20px; position: absolute; left: 75%; transform: translateX(-50%); top: 160px; z-index: 3; }
            #petal { width: 100px; height: 100px; position: absolute; top: 50%; }
            
            #flower { width: 100px; height: 150px; position: absolute; left: 54%; top: 340px; z-index: -1; transform: rotate(-10deg); }
            #flower1 { width: 100px; height: 150px; position: absolute; left: 78%; top: 250px; z-index: -1; transform: scaleX(-1); }
            #flower2 { width: 100px; height: 150px; position: absolute; left: 83%; top: 320px; z-index: -2; transform: rotate(15deg); }
            #clip1 { width: 80px; height: 80px; position: absolute; left: 1%; top: -15px; }
            #clip2 { width: 80px; height: 80px; position: absolute; left: -5%; top: 330px; }

            #ig { width: 100px; height: 100px; position: absolute; top: 88%; left: 65%; z-index: 3; }
            #mail { width: 100px; height: 100px; position: absolute; top: 88%; left: 80%; z-index: 3; }

            .stickyB, .stickyG, .stickyP, .stickyY { width: 100%; height: 100%; display: block; }
            .r2 { width: 1850px; height: 350px; }
            .hey { width: 180px; height: 100px; }
            .there { width: 250px; height: 100px; }
            .im { width: 205px; height: 150px; }
            .reign { width: 359px; height: 150px; }
            .insta { width: 80px; height: 80px; }
            .contact { width: 80px; height: 80px; }

            .c2 { width: 320px; height: 240px; }

        }

        #portfolio:hover, #about:hover, #resume:hover, #philosophy:hover {
            animation: wiggle 0.3s infinite linear;
            cursor: pointer; 
        }

        @keyframes wiggle {
            0%   { transform: rotate(0deg); }
            25%  { transform: rotate(1deg) translate(1px, -1px); }
            50%  { transform: rotate(0deg) translate(-1px, 1px); }
            75%  { transform: rotate(-1deg) translate(1px, 1px); }
            100% { transform: rotate(0deg) translate(0, 0); }
        }

</head>
<body>

    <!-- Html popup scrn -->
    <div id="artOverlay" class="popup-overlay">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div class="popup-content">
            <img id="popupImage" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Enlarged view">
            <p id="popupCaption"></p>
        </div>
    </div>

    <script type="text/javascript">
    function openPopup(imageSrc, captionText) {
        const overlay = document.getElementById('artOverlay');
        const popupImg = document.getElementById('popupImage');
        const popupCap = document.getElementById('popupCaption');
        
        // OPTIMIZATION 5: Prefetch the target image right as they initiate the click
        const imgPreloader = new Image();
        imgPreloader.src = imageSrc;
        
        imgPreloader.onload = function() {
            popupImg.src = imageSrc;
            popupCap.textContent = captionText ? captionText : '';
            overlay.style.display = 'flex';
        };
    }

    function closePopup() {
        document.getElementById('artOverlay').style.display = 'none';
        // Reset back to blank placeholder when closing to free up device memory cache
        document.getElementById('popupImage').src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    }

    window.onclick = function(event) {
        const overlay = document.getElementById('artOverlay');
        if (event.target === overlay) {
            closePopup();
        }
    }
    </script>

</body>
</html>
